agrisupply:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      user: "{{ env_var('DB_USER', 'postgres') }}"
      password: "{{ env_var('DB_PASSWORD', 'your_password_here') }}"
      port: "{{ env_var('DB_PORT', '5432') | as_number }}"
      dbname: "{{ env_var('DB_NAME', 'postgres') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
